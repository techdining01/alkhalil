{% extends "base.html" %}
{% block content %}
<main class="auth">
  <div class="auth-card" data-reveal>
    <h3 class="auth-title">Join the Foundation</h3>
    <p class="auth-sub">Create an account to publish campaigns and participate.</p>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-row"><label>Username {{ form.username }}</label></div>
      <div class="form-row"><label>Email {{ form.email }}</label></div>
      <div class="form-row"><label>Full name {{ form.full_name }}</label></div>
      <div class="form-row"><label>Password {{ form.password }}</label></div>
      <div class="form-actions">
        <a class="btn" href="{% url 'login' %}">I have an account</a>
        <button class="btn primary" type="submit">Register</button>
      </div>
    </form>
  </div>
</main>
{% endblock %}
{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (window.gsap) {
      gsap.fromTo('.auth-card',
        { y: 40, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.8, ease: 'power3.out', clearProps: 'all' }
      );
      gsap.fromTo('.auth-form > *',
        { y: 20, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.6, stagger: 0.1, ease: 'power2.out', delay: 0.2, clearProps: 'all' }
      );
    }
  });
</script>
{% endblock %}
